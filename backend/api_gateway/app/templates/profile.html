<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Control System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .logo h1 {
            color: #333;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 16px;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
            margin-right: 20px;
        }

        .profile-info h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-info .role {
            color: #667eea;
            font-size: 16px;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .avatar {
                margin-right: 0;
                margin-bottom: 15px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>Control System</h1>
                <p>Система управления строительными проектами</p>
            </div>
        </div>

        <div id="errorMessage" class="error"></div>

        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="userAvatar">U</div>
                <div class="profile-info">
                    <h2 id="userFullName">Загрузка...</h2>
                    <div class="role" id="userRole">Загрузка...</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">📧 Email</div>
                    <div class="info-value" id="userEmail">Загрузка...</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">👤 Должность</div>
                    <div class="info-value" id="userRoleDisplay">Загрузка...</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">📅 Дата регистрации</div>
                    <div class="info-value" id="userCreatedAt">Загрузка...</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">🆔 ID пользователя</div>
                    <div class="info-value" id="userId">Загрузка...</div>
                </div>
            </div>

            <div class="actions">
                <a href="/orders" class="btn">
                    📦 Перейти к дефектам
                </a>
                <button onclick="logout()" class="btn btn-danger">
                    🚪 Выйти из системы
                </button>
            </div>
        </div>
    </div>

    <script>
        // Загрузка данных профиля
        async function loadProfile() {
            try {
                const response = await fetch('/api/v1/users/me');
                
                if (response.ok) {
                    const userData = await response.json();
                    
                    // Обновляем аватар
                    document.getElementById('userAvatar').textContent = 
                        userData.full_name ? userData.full_name.charAt(0).toUpperCase() : 'U';
                    
                    // Обновляем информацию
                    document.getElementById('userFullName').textContent = userData.full_name || 'Не указано';
                    document.getElementById('userEmail').textContent = userData.email;
                    document.getElementById('userRole').textContent = getRoleDisplayName(userData.role);
                    document.getElementById('userRoleDisplay').textContent = getRoleDisplayName(userData.role);
                    document.getElementById('userCreatedAt').textContent = new Date(userData.created_at).toLocaleDateString('ru-RU');
                    document.getElementById('userId').textContent = userData.id;
                } else {
                    showError('Ошибка загрузки профиля');
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
            }
        }

        function getRoleDisplayName(role) {
            const roles = {
                'engineer': '🛠️ Инженер',
                'manager': '📊 Менеджер', 
                'seo': '👨‍💼 Руководитель'
            };
            return roles[role] || role;
        }

        function logout() {
            document.cookie = "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '/login';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Загружаем профиль при загрузке страницы
        loadProfile();
    </script>
</body>
</html>
